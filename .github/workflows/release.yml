name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  build-release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      COVERAGE_THRESHOLD: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('NEShim/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore NEShim/NEShim.sln -r win-x64 -p:PublishReadyToRun=true

      - name: Test
        run: >
          dotnet test NEShim/NEShim.Tests/NEShim.Tests.csproj
          --no-restore
          --logger "trx;LogFileName=results.trx"
          --results-directory TestResults
          --collect:"XPlat Code Coverage"
          --settings NEShim/coverage.runsettings

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: >
          reportgenerator
          "-reports:TestResults/**/coverage.cobertura.xml"
          "-targetdir:CoverageReport"
          "-reporttypes:HtmlInline;TextSummary"

      - name: Check coverage gate
        shell: pwsh
        run: |
          $summary = Get-Content CoverageReport/Summary.txt -Raw
          if ($summary -match 'Line coverage:\s+([\d.]+)%') {
            $pct = [double]$Matches[1]
            Write-Host "Line coverage: $pct%"
            if ($pct -lt $env:COVERAGE_THRESHOLD) {
              Write-Error "Line coverage $pct% is below the required $env:COVERAGE_THRESHOLD%"
              exit 1
            }
          } else {
            Write-Error "Could not parse coverage summary"
            exit 1
          }

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: CoverageReport/

      - name: Publish game
        run: >
          dotnet publish NEShim/NEShim/NEShim.csproj
          --no-restore
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishReadyToRun=true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o publish/NEShim

      - name: Publish sealer tool
        run: >
          dotnet publish NEShim/NEShim.SealAchievements/NEShim.SealAchievements.csproj
          --no-restore
          -c Release
          -r win-x64
          --self-contained true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o publish/SealAchievements

      - name: Zip game artifact
        run: Compress-Archive -Path publish/NEShim/* -DestinationPath NEShim-${{ github.ref_name }}-win-x64.zip
        shell: pwsh

      - name: Zip sealer artifact
        run: Compress-Archive -Path publish/SealAchievements/* -DestinationPath SealAchievements-${{ github.ref_name }}-win-x64.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            NEShim-${{ github.ref_name }}-win-x64.zip
            SealAchievements-${{ github.ref_name }}-win-x64.zip
