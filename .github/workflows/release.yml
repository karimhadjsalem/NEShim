name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  build-release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      COVERAGE_THRESHOLD: 80

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('NEShim/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore NEShim/NEShim.sln -r win-x64 -p:PublishReadyToRun=true

      - name: Test
        run: >
          dotnet test NEShim/NEShim.Tests/NEShim.Tests.csproj
          --no-restore
          --logger "trx;LogFileName=results.trx"
          --results-directory TestResults
          --collect:"XPlat Code Coverage"
          --settings NEShim/coverage.runsettings

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: >
          reportgenerator
          "-reports:TestResults/**/coverage.cobertura.xml"
          "-targetdir:CoverageReport"
          "-reporttypes:HtmlInline;TextSummary"

      - name: Check coverage gate
        shell: pwsh
        run: |
          $summary = Get-Content CoverageReport/Summary.txt -Raw
          if ($summary -match 'Line coverage:\s+([\d.]+)%') {
            $pct = [double]$Matches[1]
            Write-Host "Line coverage: $pct%"
            if ($pct -lt $env:COVERAGE_THRESHOLD) {
              Write-Error "Line coverage $pct% is below the required $env:COVERAGE_THRESHOLD%"
              exit 1
            }
          } else {
            Write-Error "Could not parse coverage summary"
            exit 1
          }

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: CoverageReport/

      - name: Publish game
        run: >
          dotnet publish NEShim/NEShim/NEShim.csproj
          --no-restore
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishReadyToRun=true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o publish/NEShim

      - name: Publish sealer tool
        run: >
          dotnet publish NEShim/NEShim.SealAchievements/NEShim.SealAchievements.csproj
          --no-restore
          -c Release
          -r win-x64
          --self-contained true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o publish/SealAchievements

      - name: Zip game artifact
        run: Compress-Archive -Path publish/NEShim/* -DestinationPath NEShim-${{ github.ref_name }}-win-x64.zip
        shell: pwsh

      - name: Zip sealer artifact
        run: Compress-Archive -Path publish/SealAchievements/* -DestinationPath SealAchievements-${{ github.ref_name }}-win-x64.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            NEShim-${{ github.ref_name }}-win-x64.zip
            SealAchievements-${{ github.ref_name }}-win-x64.zip

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: ghpages-work

      - name: Snapshot docs for this version
        shell: python
        working-directory: ghpages-work
        run: |
          import os, re, shutil

          version = "${{ steps.version.outputs.VERSION }}"
          src = "prerelease"
          dst = f"versions/v{version}"
          os.makedirs(dst, exist_ok=True)
          shutil.copytree(src, dst, dirs_exist_ok=True)

          for fname in os.listdir(dst):
              if not fname.endswith(".md"):
                  continue
              path = os.path.join(dst, fname)
              with open(path, encoding="utf-8") as f:
                  content = f.read()

              # Strip permalink so Jekyll builds pages at their natural versioned path
              content = re.sub(r"^permalink:.*\n", "", content, flags=re.MULTILINE)

              # Scope parent hierarchy to this version to avoid cross-version nav collisions.
              # The prerelease index is titled "Pre-release"; rename it to the version string
              # and mark it nav_exclude: false so the path-scope search_exclude default does
              # not suppress it from sidebar navigation.
              content = re.sub(r"^title: Pre-release$", f"title: v{version}", content, flags=re.MULTILINE)
              if re.search(rf"^title: v{re.escape(version)}$", content, flags=re.MULTILINE):
                  content = re.sub(r"^nav_order:.*$", "nav_order: 50", content, flags=re.MULTILINE)
                  # Explicit override so the versions/ path scope never suppresses this page
                  if not re.search(r"^nav_exclude:", content, flags=re.MULTILINE):
                      content = re.sub(r"^(has_children:.*)", r"\1\nnav_exclude: false", content, flags=re.MULTILINE)
              # Direct children of the prerelease root → children of this version's root
              content = re.sub(r"^parent: Pre-release$", f"parent: v{version}", content, flags=re.MULTILINE)
              # Grandchildren (publishing sub-pages): scope grand_parent and nav-exclude them
              # so the theme never builds an ambiguous cross-version children list.
              # The publishing page's manual links still work; the sub-pages remain accessible
              # via direct URL but are invisible to the nav tree.
              if re.search(r"^grand_parent: Pre-release$", content, flags=re.MULTILINE):
                  content = re.sub(r"^grand_parent: Pre-release$", f"grand_parent: v{version}", content, flags=re.MULTILINE)
                  if not re.search(r"^nav_exclude:", content, flags=re.MULTILINE):
                      content = re.sub(r"^(grand_parent:.*)", r"\1\nnav_exclude: true", content, flags=re.MULTILINE)
              # Remove has_children from non-root pages (pages with a parent: key).
              # The version root index keeps has_children so it collapses in the sidebar;
              # only mid-level parent pages (e.g. publishing.md) lose it to prevent the
              # theme from auto-generating a cross-version child TOC.
              if re.search(r"^parent:", content, flags=re.MULTILINE):
                  content = re.sub(r"^has_children: true\n", "", content, flags=re.MULTILINE)

              with open(path, "w", encoding="utf-8") as f:
                  f.write(content)

      - name: Update version history
        shell: python
        working-directory: ghpages-work
        run: |
          import re

          version = "${{ steps.version.outputs.VERSION }}"

          new_entry = f"- [v{version}](v{version}/)\n"
          with open("versions/index.md", encoding="utf-8") as f:
              idx = f.read()
          if new_entry not in idx:
              idx = idx.replace("<!-- versions-insert-here -->\n",
                                f"<!-- versions-insert-here -->\n{new_entry}")
              with open("versions/index.md", "w", encoding="utf-8") as f:
                  f.write(idx)

          with open("_config.yml", encoding="utf-8") as f:
              cfg = f.read()
          cfg = re.sub(r'^latest_version:.*', f'latest_version: "v{version}"', cfg, flags=re.MULTILINE)
          with open("_config.yml", "w", encoding="utf-8") as f:
              f.write(cfg)

      - name: Commit and tag docs
        shell: bash
        working-directory: ghpages-work
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _config.yml versions/
          git diff --staged --quiet || git commit -m "docs: stamp version ${{ steps.version.outputs.VERSION }}"
          git tag -f "docs-${{ github.ref_name }}"
          git push origin gh-pages
          git push origin "docs-${{ github.ref_name }}" --force
