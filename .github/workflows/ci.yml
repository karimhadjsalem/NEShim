name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: windows-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      COVERAGE_THRESHOLD: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('NEShim/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore NEShim/NEShim.sln

      - name: Build
        run: dotnet build NEShim/NEShim.sln --no-restore -c Debug

      - name: Test
        run: >
          dotnet test NEShim/NEShim.Tests/NEShim.Tests.csproj
          --no-restore
          --logger "trx;LogFileName=results.trx"
          --results-directory TestResults
          --collect:"XPlat Code Coverage"
          --settings NEShim/coverage.runsettings

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: >
          reportgenerator
          "-reports:TestResults/**/coverage.cobertura.xml"
          "-targetdir:CoverageReport"
          "-reporttypes:HtmlInline;TextSummary;MarkdownSummaryGithub"

      - name: Write coverage to job summary
        shell: bash
        run: cat CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Check coverage gate
        shell: pwsh
        run: |
          $summary = Get-Content CoverageReport/Summary.txt -Raw
          if ($summary -match 'Line coverage:\s+([\d.]+)%') {
            $pct = [double]$Matches[1]
            Write-Host "Line coverage: $pct%"
            if ($pct -lt $env:COVERAGE_THRESHOLD) {
              Write-Error "Line coverage $pct% is below the required $env:COVERAGE_THRESHOLD%"
              exit 1
            }
          } else {
            Write-Error "Could not parse coverage summary"
            exit 1
          }

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/results.trx

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: CoverageReport/

      - name: Find coverage XML
        if: github.event_name == 'pull_request'
        id: find-coverage
        shell: bash
        run: echo "path=$(find TestResults -name 'coverage.cobertura.xml' | head -1)" >> $GITHUB_OUTPUT

      - name: Post coverage comment on PR
        uses: orgoro/coverage@v3
        if: github.event_name == 'pull_request'
        with:
          coverageFile: ${{ steps.find-coverage.outputs.path }}
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.30
